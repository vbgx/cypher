name: Release macOS app

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: brew install libsndfile
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m mypy --ignore-missing-imports src
      - run: QT_QPA_PLATFORM=offscreen python -m pytest tests -q
      - run: python -m PyInstaller packaging/macos/cypher.spec --noconfirm --clean
      - run: |
          mkdir -p dist/release
          ditto -c -k --sequesterRsrc --keepParent \
            dist/Cypher.app \
            dist/release/Cypher-${GITHUB_REF_NAME}-macos.zip
      - run: |
          python scripts/release_manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --artifact "dist/release/Cypher-${GITHUB_REF_NAME}-macos.zip" \
            --output "dist/release/release-manifest.json"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/Cypher-${{ github.ref_name }}-macos.zip
            dist/release/release-manifest.json
          generate_release_notes: true
